<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blockchain Message Board</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:30px;
}

.card{
border:1px solid #ccc;
border-radius:10px;
padding:20px;
margin-top:20px;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

.message{
background:#f5f5f5;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.status{
margin-top:10px;
color:#444;
}
</style>

</head>

<body>

<h1>Blockchain Message Board</h1>
<p>A simple decentralized message board on Ethereum Sepolia.</p>

<div class="card">

<button onclick="connectWallet()">Connect MetaMask</button>

<p>Wallet: <span id="wallet">Not connected</span></p>

<p>Network: <span id="network">Unknown</span></p>

<p class="status" id="status">Please connect wallet.</p>

</div>


<div class="card">

<h3>Current Message</h3>

<div class="message" id="message">Not loaded</div>

<button onclick="loadMessage()">Refresh Message</button>

</div>


<div class="card">

<h3>Update Message</h3>

<input id="newMessage" placeholder="Enter new message">

<button onclick="setMessage()">Send Transaction</button>

</div>


<script>

const contractAddress = "0xd7c8A9366Bd849990be3Fb42f49B4ff3A0D49518";

const abi = [
"function message() view returns (string)",
"function getMessage() view returns (string)",
"function setMessage(string memory _msg)"
];

let provider;
let signer;
let contract;

async function connectWallet(){

if(!window.ethereum){

document.getElementById("status").innerText="MetaMask not installed";

return;
}

try{

provider=new ethers.providers.Web3Provider(window.ethereum);

await provider.send("eth_requestAccounts",[]);

signer=provider.getSigner();

let address=await signer.getAddress();

document.getElementById("wallet").innerText=address;

let network=await provider.getNetwork();

document.getElementById("network").innerText=network.name+" ("+network.chainId+")";

if(network.chainId!==11155111){

document.getElementById("status").innerText="Please switch MetaMask to Sepolia";

return;
}

contract=new ethers.Contract(contractAddress,abi,signer);

document.getElementById("status").innerText="Wallet connected";

loadMessage();

}catch(err){

console.log(err);

document.getElementById("status").innerText="Failed to connect wallet";

}

}

async function loadMessage(){

if(!contract){

document.getElementById("status").innerText="Connect wallet first";

return;
}

try{

let msg=await contract.getMessage();

document.getElementById("message").innerText=msg;

}catch(err){

console.log(err);

document.getElementById("status").innerText="Cannot read message";

}

}

async function setMessage(){

if(!contract){

document.getElementById("status").innerText="Connect wallet first";

return;
}

let newMsg=document.getElementById("newMessage").value;

if(newMsg===""){

document.getElementById("status").innerText="Enter a message";

return;
}

try{

document.getElementById("status").innerText="Confirm transaction in MetaMask";

let tx=await contract.setMessage(newMsg);

document.getElementById("status").innerText="Transaction sent";

await tx.wait();

document.getElementById("status").innerText="Transaction confirmed";

loadMessage();

}catch(err){

console.log(err);

document.getElementById("status").innerText="Transaction failed";

}

}

</script>

</body>

</html>
